steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nailkolors:$COMMIT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/nailkolors:latest'
      - '.'

  # Push to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nailkolors:$COMMIT_SHA']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/nailkolors:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'nailkolors'
      - '--image=gcr.io/$PROJECT_ID/nailkolors:$COMMIT_SHA'
      - '--region=us-central1'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--port=8080'
      - '--memory=512Mi'
      - '--min-instances=0'
      - '--max-instances=3'

images:
  - 'gcr.io/$PROJECT_ID/nailkolors:$COMMIT_SHA'
  - 'gcr.io/$PROJECT_ID/nailkolors:latest'
